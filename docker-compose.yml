services:
    db:
        image: postgres:18-alpine
        environment:
            POSTGRES_USER: strand
            POSTGRES_PASSWORD: strand
            POSTGRES_DB: strand_dev
        ports:
            - "5499:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U strand -d strand_dev"]
            interval: 5s
            timeout: 5s
            retries: 5

    jaeger:
        image: jaegertracing/all-in-one:1.57
        ports:
            - "16686:16686" # Web UI → http://localhost:16686
            - "4317:4317" # OTLP gRPC (default port — no config needed)
        environment:
            COLLECTOR_OTLP_ENABLED: "true"

volumes:
    db_data:
