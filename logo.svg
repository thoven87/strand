<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with rounded corners -->
  <rect width="256" height="256" rx="52" fill="#0d0d1a"/>

  <!-- Outer ring — subtle guide circle -->
  <circle cx="128" cy="128" r="104" stroke="#1e1e40" stroke-width="2"/>

  <!-- Three workflow nodes -->
  <circle cx="82"  cy="70"  r="20" fill="#6366f1"/>
  <circle cx="174" cy="128" r="20" fill="#818cf8"/>
  <circle cx="82"  cy="186" r="20" fill="#6366f1"/>

  <!-- Node highlights -->
  <circle cx="76"  cy="64"  r="7"  fill="#a5b4fc" opacity="0.35"/>
  <circle cx="168" cy="122" r="7"  fill="#c7d2fe" opacity="0.35"/>
  <circle cx="76"  cy="180" r="7"  fill="#a5b4fc" opacity="0.35"/>

  <!-- Upper strand — S-curve from top node to middle node -->
  <path
    d="M 82 90 C 82 114 124 112 128 124 C 132 136 174 134 174 108"
    stroke="#a5b4fc"
    stroke-width="7"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Lower strand — S-curve from middle node to bottom node -->
  <path
    d="M 174 148 C 174 172 132 170 128 182 C 124 194 82 192 82 166"
    stroke="#a5b4fc"
    stroke-width="7"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Short vertical stubs connecting nodes to curves -->
  <line x1="82"  y1="90"  x2="82"  y2="96"  stroke="#a5b4fc" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <line x1="174" y1="108" x2="174" y2="148" stroke="#a5b4fc" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  <line x1="82"  y1="166" x2="82"  y2="160" stroke="#a5b4fc" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
</svg>
