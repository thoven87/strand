name: Release

# Fires when:
#   • You push a version tag from the CLI:
#       git tag 1.0.0 && git push origin 1.0.0
#   • You click "Publish release" in the GitHub UI with a new tag —
#       GitHub pushes the tag, which triggers push.tags below.
#
# Pre-release tags (1.0.0-beta.1, 1.0.0-rc.1) are handled by the
# second tag pattern and marked as pre-releases on GitHub.

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+" # stable:      1.0.0, 12.3.456
            - "[0-9]+.[0-9]+.[0-9]+-*" # pre-release: 1.0.0-beta.1, 1.0.0-rc.1

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write # push version-bump commit + create release

jobs:
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            # ── 1. Bump Sources/Strand/Version.swift ─────────────────────────
            # The full tag name becomes StrandVersion.current, including any
            # pre-release suffix: "1.0.0-beta.1", "1.0.0-rc.2", "1.0.0".
            - name: Bump version constant
              env:
                  VERSION: ${{ github.ref_name }}
              run: |
                  sed -i \
                    "s/public static let current = \".*\"/public static let current = \"${VERSION}\"/" \
                    Sources/Strand/Version.swift

                  echo "Version.swift updated to:"
                  grep "public static let current" Sources/Strand/Version.swift

            # ── 2. Commit the bump back to main ──────────────────────────────
            - name: Commit version bump
              env:
                  VERSION: ${{ github.ref_name }}
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add Sources/Strand/Version.swift
                  git commit -m "chore: release ${VERSION}"
                  git push origin HEAD:main

            # ── 3. Detect whether this is a pre-release ───────────────────────
            # Any tag containing "-" (1.0.0-beta.1, 1.0.0-rc.2) is a pre-release.
            # Stable releases (1.0.0) become the "latest" release on GitHub.
            - name: Detect pre-release
              id: meta
              run: |
                  if echo "${{ github.ref_name }}" | grep -qE '\-'; then
                    echo "prerelease=true"  >> "$GITHUB_OUTPUT"
                    echo "make_latest=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "prerelease=false" >> "$GITHUB_OUTPUT"
                    echo "make_latest=true"  >> "$GITHUB_OUTPUT"
                  fi

            # ── 4. Create the GitHub release ──────────────────────────────────
            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  prerelease: ${{ steps.meta.outputs.prerelease }}
                  make_latest: ${{ steps.meta.outputs.make_latest }}
                  generate_release_notes: true
