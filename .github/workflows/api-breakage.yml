name: API breaking changes

on:
    pull_request:
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}-apibreakage
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    linux:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        container:
            image: swift:latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            # https://github.com/actions/checkout/issues/766
            - name: Mark the workspace as safe
              run: git config --global --add safe.directory ${GITHUB_WORKSPACE}
            - name: API breaking changes
              run: |
                  # --baseline-dir moves the baseline checkout outside .build so
                  # the C module maps from the baseline and the current build are
                  # in separate directory trees. Without this flag the digester
                  # places the baseline inside .build/…/apidiff/ and Clang sees
                  # two module.modulemap files for CNIOAtomics, CCompressZlib, etc.
                  # in the same session, producing "redefinition of module" errors
                  # that cause the baseline to have no symbols — every public symbol
                  # then appears to be a breaking change (false positive).
                  swift package diagnose-api-breaking-changes origin/${GITHUB_BASE_REF} \
                    --baseline-dir /tmp/api-baseline
